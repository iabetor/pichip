# Pichip 配置文件

# 调度器配置
scheduler:
  enabled: true
  noon_sync_time: "11:35"      # 中午同步时间（交易日，收盘后5分钟）
  sync_time: "16:05"           # 下午增量同步时间（收盘后5分钟）
  full_sync_time: "03:00"      # 全量同步时间（周日）
  sync_weekdays: [1, 2, 3, 4, 5]  # 执行日期（周一到周五）
  verify_time: "17:00"         # 验证时间

# 同步配置
sync:
  recent_days: 30              # 增量同步天数
  full_years: 3                # 全量同步年数

# 匹配配置
match:
  default_volume_weight: 0.0   # 默认量能权重
  default_min_corr: 0.7        # 默认最小相关系数

# 数据源配置
data_source:
  primary: "tushare"           # 主数据源: tushare / akshare
  tushare_token: "f55c9fb60691908344486116888c9af82f22b7ec486cb0224932cd6b"
  fallback: "akshare"          # 备用数据源

# LLM 配置（可选）
llm:
  enabled: false
  provider: "openai"           # openai / local
  model: "deepseek-chat"
  api_key: "${OPENAI_API_KEY}"                  # 从环境变量 OPENAI_API_KEY 读取
  base_url: "https://api.deepseek.com/v1"                 # 可选，自定义 API 端点
